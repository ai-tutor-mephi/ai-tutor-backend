spring:
  application:
    name: ai-tutor-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://db:5432/ai_tutor_db
    userName: tutor_user
    password: 88888888
    hikari:
      maximum-pool-size: 30
      leak-detection-threshold: 2000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 1GB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

security:
  jwt:
    secret: jbxAUJMPcDpMKDbrLrHTPUrPBnWsIggGxtHkGHYqCBCkpQDVrxSVVDlVKdrKSzzOqwyaAzsiEnBOatSZLJGVkSA
    access-expiration: 900
    refresh-expiration: 2592000
    issuer: ai-tutor-backend

app:
  minio:
    endpoint: http://minio:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: ai-tutor-files
    region: us-east-1

clients:
  rag:
    base-url: http://rag:8000
    connect-timeout: 2s
    response-timeout: 1200s
    max-in-memory-size: 1MB
    log-payloads: true
    retry:
      max-attempts: 3
      backoff: 200ms

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    org.springframework.security.web.FilterChainProxy: WARN
    org.springframework.web: INFO
